<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel Risk Advisor | Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 4px 24px rgba(38, 56, 69, 0.13);
      width: 100%;
      max-width: 420px;
      padding: 48px 40px 40px;
    }

    .logo-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }

    .logo-bar img {
      height: 52px;
      width: auto;
    }

    .divider {
      width: 1px;
      height: 40px;
      background: #B8C4CE;
      margin: 0 16px;
    }

    .brand-label {
      font-size: 13px;
      color: #54565A;
      line-height: 1.4;
      text-align: left;
    }

    .brand-label strong {
      display: block;
      font-size: 15px;
      color: #263845;
    }

    h1 {
      font-size: 22px;
      color: #263845;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #54565A;
      text-align: center;
      margin-bottom: 32px;
    }

    .accent-bar {
      width: 48px;
      height: 4px;
      background: #167BD4;
      border-radius: 2px;
      margin: 0 auto 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #263845;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #B8C4CE;
      border-radius: 6px;
      font-size: 15px;
      color: #263845;
      background: #f8fafb;
      transition: border-color 0.2s;
      outline: none;
      margin-bottom: 20px;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #167BD4;
      background: #fff;
    }

    .error-msg {
      background: #fff0f0;
      border: 1px solid #f5c6c6;
      color: #c0392b;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 18px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: #167BD4;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.3px;
    }

    button[type="submit"]:hover {
      background: #1265b0;
    }

    .footer {
      margin-top: 32px;
      text-align: center;
      font-size: 12px;
      color: #B8C4CE;
    }

    .footer strong {
      color: #54565A;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-bar">
      <img src="/static/hub_logo.png" alt="HUB International" onerror="this.style.display='none'" />
      <div class="divider"></div>
      <div class="brand-label">
        <strong>Hotel Risk Advisor</strong>
        Hotel Franchise Practice
      </div>
    </div>

    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to access the AI Proposal Generator</p>
    <div class="accent-bar"></div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required />

      <button type="submit">Sign In &rarr;</button>
    </form>

    <div class="footer">
      &copy; 2026 <strong>HUB International</strong> &mdash; Hotel Franchise Practice<br />
      Private access only. Unauthorized use is prohibited.
    </div>
  </div>
</body>
</html>
